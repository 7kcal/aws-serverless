services:
  # ============================================
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ${PWD}:${PWD}
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: ${PWD}
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - serverless-net
    tty: true
    stdin_open: true
    depends_on:
      init-resources:
        condition: service_completed_successfully

  # ============================================
  # DynamoDB Local
  # ============================================
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    user: root
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-dbPath", "/data"]
    volumes:
      - dynamodb_data:/data
    networks:
      - serverless-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000/shell/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================
  # ElasticMQ（SQS互換）
  # ============================================
  elasticmq:
    image: softwaremill/elasticmq:latest
    ports:
      - "9324:9324"
      - "9325:9325"
    volumes:
      - ./config/elasticmq.conf:/opt/elasticmq.conf
    networks:
      - serverless-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9324 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================
  # MinIO（S3互換）
  # ============================================
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - serverless-net

  # ============================================
  # DynamoDB Admin (Web UI)
  # ============================================
  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    ports:
      - "8001:8001"
    environment:
      - DYNAMO_ENDPOINT=http://dynamodb-local:8000
      - AWS_REGION=ap-northeast-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    depends_on:
      dynamodb-local:
        condition: service_healthy
    networks:
      - serverless-net

  # ============================================
  # 初期化コンテナ
  # ============================================
  init-resources:
    image: amazon/aws-cli:latest
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=ap-northeast-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "=== Creating DynamoDB tables ==="
        aws dynamodb create-table \
          --endpoint-url http://dynamodb-local:8000 \
          --table-name Users \
          --attribute-definitions AttributeName=userId,AttributeType=S \
          --key-schema AttributeName=userId,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          2>/dev/null && echo "✅ Created: Users" || echo "⏭️  Already exists: Users"
        echo "=== Done ==="
        aws dynamodb list-tables --endpoint-url http://dynamodb-local:8000
    networks:
      - serverless-net

volumes:
  dynamodb_data:
    name: serverless-dynamodb-data
  minio_data:
    name: serverless-minio-data

networks:
  serverless-net:
    name: serverless-net
